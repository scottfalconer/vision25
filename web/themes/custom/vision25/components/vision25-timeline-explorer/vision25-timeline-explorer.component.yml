"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Vision 25 Timeline Explorer
group: Vision 25
status: stable
props:
  type: object
  properties:
    past_label:
      type: string
      title: Past label
      default: Past 25
    future_label:
      type: string
      title: Future label
      default: Next 25
    past_milestones:
      type: array
      title: Past milestones
      items:
        type: object
        additionalProperties: true
    future_milestones:
      type: array
      title: Future milestones
      items:
        type: object
        additionalProperties: true
