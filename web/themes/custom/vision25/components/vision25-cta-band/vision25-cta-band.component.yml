"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Vision 25 CTA Band
group: Vision 25
status: stable
props:
  type: object
  required:
    - title
    - subtitle
    - cta_label
    - cta_url
  properties:
    title:
      type: string
      title: CTA title
      default: Step it up.
      examples:
        - Step it up.
    subtitle:
      type: string
      title: CTA subtitle
      default: The baseline of ambition shifted. Join us.
      examples:
        - The baseline of ambition shifted. Join us.
    cta_label:
      type: string
      title: CTA label
      default: Register Now
      examples:
        - Register Now
    cta_url:
      type: string
      title: CTA URL
      format: uri-reference
      default: /register
      examples:
        - /register
